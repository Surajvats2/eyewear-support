<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>चश्मा सेवा - चश्मे की देखभाल और मरम्मत</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>चश्मा सेवा</h1>
        <p>आपके चश्मे को दें नया जीवन!</p>
    </header>
    <main>
        <section class="upload-section">
            <h2>चश्मे की स्थिति अपलोड करें</h2>
            <form id="upload-form">
                <label for="glasses-image">तस्वीर अपलोड करें:</label>
                <input type="file" id="glasses-image" accept="image/*" required>
                <button type="submit">विश्लेषण करें</button>
            </form>
        </section>
        <section class="appointment-section">
            <h2>अपॉइंटमेंट बुक करें</h2>
            <button id="book-btn">अभी बुक करें</button>
        </section>
        
        <section class="signup-section">
            <h2>साइन अप करें</h2>
            <form id="signup-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Sign Up</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 चश्मा सेवा</p>
    </footer>

    <script type="module">
      // 1. Firebase और Firestore के आवश्यक फंक्शन्स इम्पोर्ट करें
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
      import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
      // Firestore इम्पोर्ट किया
      import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js"; 

      // आपका Firebase कॉन्फ़िगरेशन
      const firebaseConfig = {
        apiKey: "AIzaSyBPUI4VCU-CZ58DsEwxBW9oi3qzVXT2bqs",
        authDomain: "eyewear-support.firebaseapp.com",
        projectId: "eyewear-support",
        storageBucket: "eyewear-support.firebasestorage.app",
        messagingSenderId: "1019699668530",
        appId: "1:1019699668530:web:43426caf6f80c67e9bfe2b",
        measurementId: "G-W5LM98Q90N"
      };

      // 2. Firebase इनिशियलाइज़ करें
      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
      const auth = getAuth(app); 
      const db = getFirestore(app); // Firestore को चालू किया

      // 3. अपॉइंटमेंट बुक करने का लॉजिक (जैसा आपने तय किया था)
      const bookBtn = document.getElementById('book-btn');
      if (bookBtn) {
          bookBtn.addEventListener('click', async () => {
              try {
                  // आपने कहा था: कलेक्शन = appointments, ID = ग्राहक का नाम, फ़ील्ड = customerName और appointmentLetter
                  const customerName = "राहुल शर्मा"; 
                  const appointmentLetter = "यह आपका अपॉइंटमेंट कन्फर्मेशन लेटर है।";

                  // Firestore में डेटा सेव करना (ID को 'customerName' यानी राहुल शर्मा रखा है)
                  await setDoc(doc(db, "appointments", customerName), {
                      customerName: customerName,
                      appointmentLetter: appointmentLetter
                  });

                  alert("अपॉइंटमेंट सफलतापूर्वक बुक हो गया है और Firestore में सेव हो गया है!");
                  console.log("Data saved successfully!");
              } catch (error) {
                  console.error("Error booking appointment: ", error);
                  alert("गड़बड़ हुई: " + error.message);
              }
          });
      }

      // 4. साइन-अप फॉर्म का लॉजिक
      const signupForm = document.getElementById('signup-form');
      if (signupForm) {
          signupForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            createUserWithEmailAndPassword(auth, email, password)
              .then((cred) => {
                console.log(cred.user);
                alert('Sign up successful!');
              })
              .catch((error) => {
                console.error(error.message);
                alert('Error: ' + error.message);
              });
          });
      }
    </script> 
</body>
</html>
