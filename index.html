<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpecAI - Precision Meets Personality</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>SpecAI</h1>
        <p>Where Precision Meets Personality.</p>
    </header>

    <main>
        <section class="upload-section">
            <h2>स्मार्ट विज़न विश्लेषण</h2>
            <form id="upload-form">
                <label for="glasses-image">अपने चश्मे की स्थिति की तस्वीर अपलोड करें:</label>
                <input type="file" id="glasses-image" accept="image/*" required>
                <button type="submit">AI विश्लेषण शुरू करें</button>
            </form>
        </section>

        <section class="appointment-section">
            <h2>एक्सपर्ट अपॉइंटमेंट</h2>
            <p style="color: #a4b3c6; margin-bottom: 20px; font-size: 1.1rem;">स्टाइल गाइडेंस और सटीक आई-टेस्ट के लिए अपना स्लॉट सुरक्षित करें।</p>
            <button id="book-btn">अभी स्लॉट बुक करें</button>
        </section>
        
        <section class="signup-section">
            <h2>SpecAI क्लब में शामिल हों</h2>
            <form id="signup-form">
                <input type="email" id="email" placeholder="आपका ईमेल पता" required>
                <input type="password" id="password" placeholder="एक सुरक्षित पासवर्ड बनाएं" required>
                <button type="submit">साइन अप करें</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 SpecAI. Elevating Vision & Style.</p>
    </footer>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
      import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
      import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js"; 

      const firebaseConfig = {
        apiKey: "AIzaSyBPUI4VCU-CZ58DsEwxBW9oi3qzVXT2bqs",
        authDomain: "eyewear-support.firebaseapp.com",
        projectId: "eyewear-support",
        storageBucket: "eyewear-support.firebasestorage.app",
        messagingSenderId: "1019699668530",
        appId: "1:1019699668530:web:43426caf6f80c67e9bfe2b",
        measurementId: "G-W5LM98Q90N"
      };

      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
      const auth = getAuth(app); 
      const db = getFirestore(app);

      // Book Appointment Logic
      const bookBtn = document.getElementById('book-btn');
      if (bookBtn) {
          bookBtn.addEventListener('click', async () => {
              try {
                  const customerName = "राहुल शर्मा"; 
                  const appointmentLetter = "यह आपका SpecAI VIP अपॉइंटमेंट कन्फर्मेशन लेटर है।";

                  await setDoc(doc(db, "appointments", customerName), {
                      customerName: customerName,
                      appointmentLetter: appointmentLetter
                  });

                  alert("SpecAI VIP अपॉइंटमेंट सफलतापूर्वक बुक हो गया है!");
                  console.log("Data saved to Firestore!");
              } catch (error) {
                  console.error("Error booking appointment: ", error);
                  alert("त्रुटि: " + error.message);
              }
          });
      }

      // Signup Logic
      const signupForm = document.getElementById('signup-form');
      if (signupForm) {
          signupForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            createUserWithEmailAndPassword(auth, email, password)
              .then((cred) => {
                console.log(cred.user);
                alert('SpecAI अकाउंट सफलतापूर्वक बन गया है!');
              })
              .catch((error) => {
                console.error(error.message);
                alert('Error: ' + error.message);
              });
          });
      }
    </script> 
</body>
</html>
