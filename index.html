<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>चश्मा सेवा - चश्मे की देखभाल और मरम्मत</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>चश्मा सेवा</h1>
        <p>आपके चश्मे को दें नया जीवन!</p>
    </header>
    <main>
        <section class="upload-section">
            <h2>चश्मे की स्थिति अपलोड करें</h2>
            <form id="upload-form">
                <label for="glasses-image">तस्वीर अपलोड करें:</label>
                <input type="file" id="glasses-image" accept="image/*" required>
                <button type="submit">विश्लेषण करें</button>
            </form>
        </section>
        <section class="appointment-section">
            <h2>अपॉइंटमेंट बुक करें</h2>
            <button onclick="bookAppointment()">अभी बुक करें</button>
        </section>
        
        <section class="signup-section">
            <h2>साइन अप करें</h2>
            <form id="signup-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Sign Up</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 चश्मा सेवा</p>
    </footer>

    <script type="module">
      // 1. आवश्यक फंक्शन्स इम्पोर्ट करें (Auth भी शामिल किया है)
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
      import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

      // आपका Firebase कॉन्फ़िगरेशन
      const firebaseConfig = {
        apiKey: "AIzaSyBPUI4VCU-CZ58DsEwxBW9oi3qzVXT2bqs",
        authDomain: "eyewear-support.firebaseapp.com",
        projectId: "eyewear-support",
        storageBucket: "eyewear-support.firebasestorage.app",
        messagingSenderId: "1019699668530",
        appId: "1:1019699668530:web:43426caf6f80c67e9bfe2b",
        measurementId: "G-W5LM98Q90N"
      };

      // 2. Firebase इनिशियलाइज़ करें
      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
      const auth = getAuth(app); // नया तरीका

      // 3. साइन-अप फॉर्म का लॉजिक (अब यह स्क्रिप्ट के अंदर है)
      const signupForm = document.getElementById('signup-form');
      if (signupForm) {
          signupForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // नए फ़ायरबेस वर्ज़न के हिसाब से यूज़र बनाना
            createUserWithEmailAndPassword(auth, email, password)
              .then((cred) => {
                console.log(cred.user);
                alert('Sign up successful!');
              })
              .catch((error) => {
                console.error(error.message);
                alert('Error: ' + error.message);
              });
          });
      }
    </script> </body>
</html>
