<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpecAI — Checkout</title>
<link rel="stylesheet" href="css/shared.css">
<!-- QR code generator (no install needed, CDN) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  .checkout-wrap{max-width:560px;margin:50px auto;padding:0 20px;}
  .summary-card{padding:26px;margin-bottom:20px;}
  .summary-card h2{font-family:var(--serif);margin:0 0 18px;font-size:24px;color:var(--navy);}
  .line{display:flex;justify-content:space-between;font-size:14px;padding:9px 0;border-bottom:1px solid var(--line);}
  .line.total{font-weight:700;font-size:16px;border-bottom:none;padding-top:14px;}
  .pay-btn{width:100%;justify-content:center;font-size:15.5px;padding:15px;}
  .pay-btn:disabled{opacity:.5;cursor:not-allowed;}

  /* UPI modal */
  #upi-overlay{position:fixed;inset:0;background:rgba(12,20,48,.6);display:none;align-items:center;justify-content:center;z-index:1000;}
  #upi-overlay.open{display:flex;}
  .upi-modal{background:#fff;border-radius:16px;width:400px;max-width:93vw;overflow:hidden;}
  .upi-head{background:#072654;color:#fff;padding:18px 22px;}
  .upi-head h3{margin:0;font-size:16px;}
  .upi-head p{margin:4px 0 0;font-size:13px;opacity:.8;}
  .upi-body{padding:24px;text-align:center;}
  .qr-box{display:inline-block;padding:14px;border:2px solid #e8edf5;border-radius:12px;margin-bottom:16px;}
  .upi-id-box{background:#f0f4ff;border-radius:8px;padding:10px 16px;font-size:15px;font-weight:700;color:#072654;margin-bottom:6px;letter-spacing:.5px;}
  .upi-hint{font-size:12.5px;color:#888;margin-bottom:20px;}
  .utr-row{display:flex;gap:8px;margin-bottom:8px;}
  .utr-row input{flex:1;padding:10px 14px;border:1.5px solid #d1d9e6;border-radius:8px;font-size:14px;outline:none;}
  .utr-row input:focus{border-color:#3b82f6;}
  .confirm-btn{width:100%;justify-content:center;padding:13px;}
  .upi-foot{padding:12px 22px;border-top:1px solid #eee;text-align:center;font-size:12px;color:#aaa;}
  .success-icon{font-size:48px;margin-bottom:12px;}
</style>
</head>
<body>

<header class="site">
  <div class="wrap nav">
    <a class="logo" href="index.html">✕ SpecAI.</a>
    <nav class="navlinks"><a href="index.html">Back to store</a></nav>
    <div class="nav-right"><span id="auth-slot"></span></div>
  </div>
</header>

<div class="wrap checkout-wrap">
  <div class="card summary-card">
    <h2>Order Summary</h2>
    <div id="lines"></div>
    <div class="line total"><span>Total</span><span id="grand-total">₹0</span></div>
  </div>
  <button class="btn-dark pay-btn" id="pay-btn" onclick="startPayment()">Pay via UPI</button>
  <p class="muted" style="text-align:center;font-size:12.5px;margin-top:10px;">
    📱 Scan QR with any UPI app — GPay, PhonePe, Paytm, BHIM
  </p>
</div>

<!-- UPI Modal -->
<div id="upi-overlay">
  <div class="upi-modal">
    <div class="upi-head">
      <h3>Pay via UPI</h3>
      <p id="modal-amount">Amount: ₹0</p>
    </div>
    <div class="upi-body" id="upi-body">
      <!-- filled by JS -->
    </div>
    <div class="upi-foot">After payment, enter UPI transaction ID / UTR to confirm your order</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="js/app.js"></script>
<script>
  Auth.ready().then((user) => {
    if (!user) location.href = "account.html?redirect=checkout.html";
  });

  let currentOrder = null;

  function renderSummary() {
    const items = Cart.get();
    if (items.length === 0) {
      document.getElementById("lines").innerHTML = `<p class="muted">Your cart is empty. <a href="index.html">Go shopping →</a></p>`;
      document.getElementById("pay-btn").disabled = true;
      return;
    }
    document.getElementById("lines").innerHTML = items.map(i => `
      <div class="line"><span>${i.name} × ${i.qty}</span><span>₹${i.price * i.qty}</span></div>
    `).join("");
    document.getElementById("grand-total").textContent = "₹" + Cart.total();
  }

  async function startPayment() {
    const btn = document.getElementById("pay-btn");
    btn.disabled = true;
    btn.textContent = "Creating order…";

    try {
      const items = Cart.get().map(i => ({ productId: i.id, qty: i.qty }));
      const { order, upiLink, upiId, amount } =
        await apiFetch("/api/orders", { method: "POST", body: JSON.stringify({ items }) });

      currentOrder = order;

      document.getElementById("modal-amount").textContent = "Amount: ₹" + amount;

      // Render QR + confirm form
      document.getElementById("upi-body").innerHTML = `
        <div style="display:flex;gap:16px;align-items:flex-start;justify-content:center;flex-wrap:wrap;margin-bottom:4px;">
          <div>
            <p style="font-size:12px;color:#888;margin:0 0 8px;">📷 Doosre phone se scan karo</p>
            <div class="qr-box" id="qr-canvas"></div>
          </div>
          <div style="display:flex;flex-direction:column;gap:10px;justify-content:center;padding-top:28px;">
            <p style="font-size:12px;color:#888;margin:0 0 4px;text-align:center;">📱 Is phone pe pay karo</p>
            <a id="gpay-btn" href="#" onclick="openUPI('gpay')" class="btn-dark" style="display:flex;align-items:center;gap:8px;padding:11px 18px;text-decoration:none;font-size:14px;">
              <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Google_Pay_Logo.svg/512px-Google_Pay_Logo.svg.png" style="height:20px;"> Google Pay
            </a>
            <a id="phonepe-btn" href="#" onclick="openUPI('phonepe')" class="btn-dark" style="display:flex;align-items:center;gap:8px;padding:11px 18px;text-decoration:none;font-size:14px;background:#5f259f;">
              <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/PhonePe_Logo.svg/512px-PhonePe_Logo.svg.png" style="height:20px;"> PhonePe
            </a>
            <a id="paytm-btn" href="#" onclick="openUPI('paytm')" class="btn-dark" style="display:flex;align-items:center;gap:8px;padding:11px 18px;text-decoration:none;font-size:14px;background:#00b9f1;">
              <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Paytm_Logo_%28standalone%29.svg/512px-Paytm_Logo_%28standalone%29.svg.png" style="height:20px;"> Paytm
            </a>
            <a id="upi-btn" href="#" onclick="openUPI('any')" style="display:flex;align-items:center;gap:8px;padding:11px 18px;text-decoration:none;font-size:13px;border:1.5px solid #072654;border-radius:8px;color:#072654;font-weight:600;">
              🏦 Any UPI App
            </a>
          </div>
        </div>
        <div class="upi-id-box" style="margin-top:8px;">📲 ${upiId}</div>
        <p class="upi-hint">Button dabao → UPI app seedha khulega → pay karo</p>
        <div class="utr-row">
          <input type="text" id="utr-input" placeholder="Enter UPI Transaction ID / UTR" />
        </div>
        <button class="btn-dark confirm-btn" onclick="confirmPayment()">✓ I have paid — Confirm Order</button>
      `;

      // Store UPI link globally for openUPI()
      window._upiLink = upiLink;
      window._upiAmount = amount;
      window._upiId = upiId;

      // Generate QR code
      new QRCode(document.getElementById("qr-canvas"), {
        text: upiLink,
        width: 200,
        height: 200,
        colorDark: "#072654",
        colorLight: "#ffffff",
      });

      document.getElementById("upi-overlay").classList.add("open");
    } catch (err) {
      alert(err.message || "Could not create order. Please try again.");
    }

    btn.disabled = false;
    btn.textContent = "Pay via UPI";
  }

  function openUPI(app) {
    const base = window._upiLink;
    let url = base;
    if (app === 'gpay') {
      url = base.replace('upi://', 'tez://upi/');
    } else if (app === 'phonepe') {
      url = base.replace('upi://', 'phonepe://');
    } else if (app === 'paytm') {
      url = `paytmmp://pay?pa=${window._upiId}&pn=SpecAI&am=${window._upiAmount}&cu=INR`;
    }
    // Fallback: if app doesn't open, try generic upi://
    window.location.href = url;
    setTimeout(() => { window.location.href = base; }, 1500);
  }

  async function confirmPayment() {
    const utr = document.getElementById("utr-input").value.trim();
    if (!utr) {
      alert("Please enter your UPI Transaction ID / UTR number after paying.");
      return;
    }

    const body = document.getElementById("upi-body");
    body.innerHTML = `<div style="padding:30px 0;"><div class="spinner" style="width:36px;height:36px;border:3px solid #dbe8ff;border-top-color:#072654;border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite;"></div><p>Confirming your order…</p></div>
    <style>@keyframes spin{to{transform:rotate(360deg);}}</style>`;

    try {
      const { order: paidOrder } = await apiFetch(`/api/orders/${currentOrder.id}/confirm`, {
        method: "POST",
        body: JSON.stringify({ utrNumber: utr }),
      });

      Cart.clear();
      // Redirect to invoice page
      location.href = `invoice.html?orderId=${paidOrder.id}`;
    } catch (err) {
      alert(err.message || "Confirmation failed. Please contact support.");
    }
  }

  renderSummary();
</script>
</body>
</html>
