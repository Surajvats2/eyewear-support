<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpecAI — Log in or Sign up</title>
<link rel="stylesheet" href="css/shared.css">
<style>
  .auth-wrap{max-width:440px;margin:60px auto;padding:0 20px;}
  .tabs{display:flex;background:var(--white);border-radius:30px;padding:5px;margin-bottom:24px;}
  .tabs button{flex:1;border:none;background:none;padding:11px 0;border-radius:26px;font-size:14px;font-weight:600;color:var(--muted);}
  .tabs button.active{background:var(--navy);color:#fff;}
  .auth-card{padding:30px;}
  .auth-card h2{font-family:var(--serif);margin:0 0 6px;font-size:26px;color:var(--navy);}
  .auth-card .sub{color:var(--muted);font-size:13.5px;margin-bottom:24px;}
  .logged-in-box{padding:30px;text-align:center;}
  .logged-in-box h2{font-family:var(--serif);font-size:24px;margin:0 0 8px;color:var(--navy);}
</style>
</head>
<body>

<header class="site">
  <div class="wrap nav">
    <a class="logo" href="index.html">✕ SpecAI.</a>
    <nav class="navlinks"><a href="index.html">Back to store</a></nav>
    <div class="nav-right"><button class="icon-btn" onclick="openCart()">🛍<span class="badge cart-badge" style="display:none">0</span></button></div>
  </div>
</header>

<div class="wrap auth-wrap" id="auth-area">
  <p class="muted" style="text-align:center;">Loading…</p>
</div>

<!-- Firebase SDKs (compat build = simplest for plain JS, no bundler needed) -->
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="js/app.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const redirect = params.get("redirect") || "index.html";

  function renderLoggedIn(user) {
    document.getElementById("auth-area").innerHTML = `
      <div class="card logged-in-box">
        <h2>You're logged in as ${user.displayName || user.email}</h2>
        <p class="muted">${user.email}</p>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:18px;">
          <a class="btn-dark" href="${redirect}">Continue →</a>
          <button class="btn-outline" onclick="Auth.logout()">Log out</button>
        </div>
      </div>`;
  }

  function renderForms() {
    document.getElementById("auth-area").innerHTML = `
      <div class="tabs">
        <button id="tab-login" class="active" onclick="switchTab('login')">Log in</button>
        <button id="tab-signup" onclick="switchTab('signup')">Sign up</button>
      </div>

      <div class="card auth-card" id="login-form">
        <h2>Welcome back</h2>
        <div class="sub">Log in to continue to checkout.</div>
        <form onsubmit="return doLogin(event)">
          <div class="field"><label>Email</label><input type="email" id="login-email" required></div>
          <div class="field"><label>Password</label><input type="password" id="login-password" required></div>
          <div class="error-text" id="login-error"></div>
          <button class="btn-dark" style="width:100%;justify-content:center;margin-top:6px;" type="submit">Log in →</button>
        </form>
      </div>

      <div class="card auth-card" id="signup-form" style="display:none">
        <h2>Create your account</h2>
        <div class="sub">Takes 30 seconds — you'll need this to checkout or book a repair.</div>
        <form onsubmit="return doSignup(event)">
          <div class="field"><label>Full name</label><input type="text" id="signup-name" required></div>
          <div class="field"><label>Email</label><input type="email" id="signup-email" required></div>
          <div class="field"><label>Phone</label><input type="tel" id="signup-phone"></div>
          <div class="field"><label>Password</label><input type="password" id="signup-password" minlength="6" required></div>
          <div class="error-text" id="signup-error"></div>
          <button class="btn-dark" style="width:100%;justify-content:center;margin-top:6px;" type="submit">Create account →</button>
        </form>
      </div>
    `;
  }

  function switchTab(tab) {
    document.getElementById("tab-login").classList.toggle("active", tab === "login");
    document.getElementById("tab-signup").classList.toggle("active", tab === "signup");
    document.getElementById("login-form").style.display = tab === "login" ? "block" : "none";
    document.getElementById("signup-form").style.display = tab === "signup" ? "block" : "none";
  }

  async function doLogin(e) {
    e.preventDefault();
    const email = document.getElementById("login-email").value;
    const password = document.getElementById("login-password").value;
    const errEl = document.getElementById("login-error");
    errEl.textContent = "";
    try {
      const cred = await firebase.auth().signInWithEmailAndPassword(email, password);
      showToast(`Welcome back, ${(cred.user.displayName || cred.user.email).split(" ")[0]}!`);
      location.href = redirect;
    } catch (err) {
      errEl.textContent = friendlyFirebaseError(err);
    }
    return false;
  }

  async function doSignup(e) {
    e.preventDefault();
    const name = document.getElementById("signup-name").value;
    const email = document.getElementById("signup-email").value;
    const phone = document.getElementById("signup-phone").value;
    const password = document.getElementById("signup-password").value;
    const errEl = document.getElementById("signup-error");
    errEl.textContent = "";
    try {
      const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
      await cred.user.updateProfile({ displayName: name });
      // Save the extra profile fields (phone) into Firestore via the backend.
      await apiFetch("/api/auth/sync", { method: "POST", body: JSON.stringify({ name, phone }) });
      showToast(`Welcome to SpecAI, ${name.split(" ")[0]}!`);
      location.href = redirect;
    } catch (err) {
      errEl.textContent = friendlyFirebaseError(err);
    }
    return false;
  }

  function friendlyFirebaseError(err) {
    const map = {
      "auth/email-already-in-use": "An account with this email already exists. Try logging in instead.",
      "auth/invalid-email": "That email address doesn't look right.",
      "auth/weak-password": "Password should be at least 6 characters.",
      "auth/user-not-found": "No account found with that email.",
      "auth/wrong-password": "Incorrect password.",
      "auth/invalid-credential": "Incorrect email or password.",
      "auth/too-many-requests": "Too many attempts — please wait a moment and try again.",
    };
    return map[err.code] || err.message || "Something went wrong.";
  }

  // Show the right view once Firebase tells us the login state.
  firebase.auth().onAuthStateChanged((user) => {
    if (user) renderLoggedIn(user);
    else renderForms();
  });
</script>
</body>
</html>
